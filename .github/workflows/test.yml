name: test and lint

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      - name: pub get
        run: dart pub get
      - name: dartfmt
        run: dart format --set-exit-if-changed .
      - name: dartanalyzer
        run: dart analyze
      - name: run test
        run: dart test
